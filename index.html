<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebXR Stillness Spirograph</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    #overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.9);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 12px 14px;
      max-width: 320px;
      line-height: 1.35;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    #overlay h1 {
      font-size: 16px;
      margin: 0 0 8px 0;
    }

    #overlay p {
      margin: 6px 0;
      font-size: 13px;
    }

    #scoreboard {
      margin-top: 10px;
      font-size: 13px;
    }

    #startPanel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button.secondary {
      background: #ececec;
      color: #111;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>Stillness Game – Spirograph Feedback</h1>
    <p>Goal: stand as still as possible while facing forward.</p>
    <p>In VR, the line stays elegant when you are stable and becomes messy when you sway.</p>
    <div id="scoreboard">
      <div><strong>Stability:</strong> <span id="stabilityValue">0</span>/100</div>
      <div><strong>Best:</strong> <span id="bestValue">0</span>/100</div>
      <div><strong>Elapsed:</strong> <span id="timeValue">0.0</span>s</div>
    </div>
  </div>

  <div id="startPanel">
    <button id="calibrateBtn" class="secondary">Calibrate Forward</button>
    <button id="resetBtn" class="secondary">Reset Trace</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer;
    let room, floor;
    let feedbackGroup;
    let traceLine;
    let traceGeometry;
    let tracePositions;
    let traceIndex = 0;
    const maxPoints = 3000;

    let soundOrb;
    let clock;

    const calibration = {
      yaw: 0,
      pitch: 0,
      roll: 0,
      hasReference: false,
    };

    const filtered = {
      pitch: 0,
      roll: 0,
      x: 0,
      z: 0,
    };

    const state = {
      score: 0,
      bestScore: 0,
      elapsed: 0,
      sessionStarted: false,
      centeredX: 0,
      centeredZ: 0,
      trailRadius: 0.055,
      time: 0,
      lastTimestamp: 0,
      audioReady: false,
    };

    const ui = {
      stabilityValue: document.getElementById('stabilityValue'),
      bestValue: document.getElementById('bestValue'),
      timeValue: document.getElementById('timeValue'),
      calibrateBtn: document.getElementById('calibrateBtn'),
      resetBtn: document.getElementById('resetBtn'),
    };

    // Optional Web Audio feedback
    let audioContext = null;
    let oscillator = null;
    let gainNode = null;
    let filterNode = null;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
      camera.position.set(0, 1.6, 2);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      clock = new THREE.Clock();

      const hemi = new THREE.HemisphereLight(0xffffff, 0xdedede, 1.6);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(1, 3, 2);
      scene.add(dir);

      room = new THREE.Group();
      scene.add(room);

      floor = new THREE.Mesh(
        new THREE.CircleGeometry(6, 64),
        new THREE.MeshStandardMaterial({ color: 0xf3f3f3, roughness: 1, metalness: 0 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      room.add(floor);

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.35, 0.42, 64),
        new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.08, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.002;
      room.add(ring);

      soundOrb = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 32, 32),
        new THREE.MeshStandardMaterial({
          color: 0x111111,
          emissive: 0x222222,
          roughness: 0.4,
          metalness: 0.0,
        })
      );
      soundOrb.position.set(0, 1.55, -1.7);
      room.add(soundOrb);

      feedbackGroup = new THREE.Group();
      camera.add(feedbackGroup);
      feedbackGroup.position.set(0, 0, -1.0);
      scene.add(camera);

      createSpirographLine();
      createFrameGuide();

      ui.calibrateBtn.addEventListener('click', calibrateForward);
      ui.resetBtn.addEventListener('click', resetTrace);

      renderer.xr.addEventListener('sessionstart', () => {
        state.sessionStarted = true;
        state.elapsed = 0;
        state.lastTimestamp = performance.now();
        resetTrace();
        calibrateForward();
        setupAudio();
      });

      renderer.xr.addEventListener('sessionend', () => {
        state.sessionStarted = false;
        stopAudio();
      });

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('click', setupAudio, { once: true });
    }

    function createSpirographLine() {
      tracePositions = new Float32Array(maxPoints * 3);
      traceGeometry = new THREE.BufferGeometry();
      traceGeometry.setAttribute('position', new THREE.BufferAttribute(tracePositions, 3));
      traceGeometry.setDrawRange(0, 0);

      const material = new THREE.LineBasicMaterial({
        color: 0x111111,
        transparent: true,
        opacity: 0.9,
      });

      traceLine = new THREE.Line(traceGeometry, material);
      feedbackGroup.add(traceLine);
    }

    function createFrameGuide() {
      const guide = new THREE.Mesh(
        new THREE.RingGeometry(0.28, 0.285, 96),
        new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.12, side: THREE.DoubleSide })
      );
      guide.position.set(0, 0, 0);
      feedbackGroup.add(guide);
    }

    function resetTrace() {
      traceIndex = 0;
      traceGeometry.setDrawRange(0, 0);
      for (let i = 0; i < tracePositions.length; i++) tracePositions[i] = 0;
      traceGeometry.attributes.position.needsUpdate = true;
      state.time = 0;
      state.elapsed = 0;
      updateUI();
    }

    function calibrateForward() {
      const euler = getHeadEuler();
      calibration.yaw = euler.y;
      calibration.pitch = euler.x;
      calibration.roll = euler.z;
      calibration.hasReference = true;

      const headsetWorld = new THREE.Vector3();
      camera.getWorldPosition(headsetWorld);
      state.centeredX = headsetWorld.x;
      state.centeredZ = headsetWorld.z;
    }

    function getHeadEuler() {
      const q = new THREE.Quaternion();
      camera.getWorldQuaternion(q);
      const euler = new THREE.Euler().setFromQuaternion(q, 'YXZ');
      return euler;
    }

    function shortestAngleDiff(a, b) {
      let diff = a - b;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      return diff;
    }

    function lowPass(current, target, alpha = 0.08) {
      return current + alpha * (target - current);
    }

    function updateGame(dt) {
      if (!calibration.hasReference) return;

      const euler = getHeadEuler();
      const headsetWorld = new THREE.Vector3();
      camera.getWorldPosition(headsetWorld);

      const yawError = shortestAngleDiff(euler.y, calibration.yaw);
      const pitchError = shortestAngleDiff(euler.x, calibration.pitch);
      const rollError = shortestAngleDiff(euler.z, calibration.roll);
      const dx = headsetWorld.x - state.centeredX;
      const dz = headsetWorld.z - state.centeredZ;

      filtered.pitch = lowPass(filtered.pitch, pitchError);
      filtered.roll = lowPass(filtered.roll, rollError);
      filtered.x = lowPass(filtered.x, dx);
      filtered.z = lowPass(filtered.z, dz);

      const swayMagnitude = Math.sqrt(
        filtered.pitch * filtered.pitch * 0.9 +
        filtered.roll * filtered.roll * 0.9 +
        filtered.x * filtered.x * 1.8 +
        filtered.z * filtered.z * 1.8
      );

      const yawPenalty = Math.abs(yawError) * 0.7;
      const combinedError = swayMagnitude + yawPenalty;

      const normalized = THREE.MathUtils.clamp(combinedError / 0.12, 0, 1);
      const score = Math.round((1 - normalized) * 100);
      state.score = score;
      state.bestScore = Math.max(state.bestScore, score);
      state.elapsed += dt;
      state.time += dt * (0.8 + normalized * 2.2);

      updateSpirograph(normalized, dt);
      updateOrb(normalized);
      updateAudio(normalized);
      updateUI();
    }

    function updateSpirograph(noiseAmount, dt) {
      const t = state.time;

      const baseR = state.trailRadius;
      const innerR = 0.018 + noiseAmount * 0.022;
      const movementGain = 0.18;
      const wobble = 0.004 + noiseAmount * 0.012;

      const x =
        Math.cos(t * 1.7) * baseR +
        Math.cos(t * 5.3) * innerR +
        filtered.roll * movementGain +
        filtered.x * 0.12 +
        Math.sin(t * 11.0) * wobble * noiseAmount;

      const y =
        Math.sin(t * 1.7) * baseR +
        Math.sin(t * 5.3) * innerR +
        filtered.pitch * movementGain +
        filtered.z * 0.12 +
        Math.cos(t * 9.0) * wobble * noiseAmount;

      const z = 0;
      addTracePoint(x, y, z);

      const opacity = 0.45 + (1 - noiseAmount) * 0.45;
      traceLine.material.opacity = opacity;
    }

    function addTracePoint(x, y, z) {
      if (traceIndex >= maxPoints) {
        for (let i = 3; i < tracePositions.length; i++) {
          tracePositions[i - 3] = tracePositions[i];
        }
        traceIndex = maxPoints - 1;
      }

      const i = traceIndex * 3;
      tracePositions[i] = x;
      tracePositions[i + 1] = y;
      tracePositions[i + 2] = z;
      traceIndex++;

      traceGeometry.setDrawRange(0, traceIndex);
      traceGeometry.attributes.position.needsUpdate = true;
    }

    function updateOrb(noiseAmount) {
      const s = 1 + (1 - noiseAmount) * 0.18;
      soundOrb.scale.setScalar(s);
      soundOrb.material.emissiveIntensity = 0.25 + (1 - noiseAmount) * 0.8;
      soundOrb.position.y = 1.55 + Math.sin(performance.now() * 0.0015) * 0.02 * (1 - noiseAmount);
    }

    function setupAudio() {
      if (state.audioReady) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        oscillator = audioContext.createOscillator();
        gainNode = audioContext.createGain();
        filterNode = audioContext.createBiquadFilter();

        oscillator.type = 'sine';
        oscillator.frequency.value = 220;

        filterNode.type = 'lowpass';
        filterNode.frequency.value = 1200;

        gainNode.gain.value = 0.02;

        oscillator.connect(filterNode);
        filterNode.connect(gainNode);
        gainNode.connect(audioContext.destination);
        oscillator.start();

        state.audioReady = true;
      } catch (err) {
        console.warn('Audio could not start:', err);
      }
    }

    function updateAudio(noiseAmount) {
      if (!state.audioReady || !audioContext) return;
      if (audioContext.state === 'suspended') audioContext.resume();

      const clarity = 1 - noiseAmount;
      oscillator.frequency.value = 140 + clarity * 220;
      filterNode.frequency.value = 350 + clarity * 2850;
      gainNode.gain.value = 0.006 + clarity * 0.05;
    }

    function stopAudio() {
      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }
      oscillator = null;
      gainNode = null;
      filterNode = null;
      state.audioReady = false;
    }

    function updateUI() {
      ui.stabilityValue.textContent = String(state.score);
      ui.bestValue.textContent = String(state.bestScore);
      ui.timeValue.textContent = state.elapsed.toFixed(1);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render() {
      const dt = Math.min(clock.getDelta(), 0.05);
      updateGame(dt);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
