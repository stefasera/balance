<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Standing Still Competition</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
      color: #111;
    }

    #overlay {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 14px;
      padding: 12px 14px;
      max-width: 340px;
      line-height: 1.35;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    }

    #scoreboard {
      margin-top: 4px;
      font-size: 13px;
    }

    #startPanel {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.94);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 999px;
      padding: 10px 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: #111;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button.secondary {
      background: #ececec;
      color: #111;
    }

    select {
      border-radius: 999px;
      padding: 10px 12px;
      border: 1px solid rgba(0,0,0,0.12);
      background: white;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="scoreboard">
      <div><strong>Stability:</strong> <span id="stabilityValue">0</span>/100</div>
      <div><strong>Best:</strong> <span id="bestValue">0</span>/100</div>
      <div><strong>Elapsed:</strong> <span id="timeValue">0.0</span>s</div>
      <div><strong>Sound:</strong> <span id="soundLabel">Rainstick</span></div>
      <div style="margin-top:6px; opacity:0.75;">
        In VR: use left/right controller trigger on the floating sound panel
      </div>
    </div>
  </div>

  <div id="startPanel">
    <label for="soundMode" style="font-size:14px;">Sound:</label>
    <select id="soundMode">
      <option value="rainstick">Rainstick</option>
      <option value="maraca">Wooden Maraca</option>
      <option value="sand">Sand Falling</option>
      <option value="ocean">Ocean Rustle</option>
      <option value="sine">Sine Wave</option>
    </select>
    <button id="calibrateBtn" class="secondary">Calibrate Forward</button>
    <button id="resetBtn" class="secondary">Reset Trace</button>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer;
    let room, floor;
    let feedbackGroup;
    let traceLine;
    let traceGeometry;
    let tracePositions;
    let traceIndex = 0;
    const maxPoints = 3000;

    let clock;
    let raycaster;

    let vrPanel;
    let vrPrevButton;
    let vrNextButton;
    let vrSoundText;
    const tempMatrix = new THREE.Matrix4();

    const calibration = {
      yaw: 0,
      pitch: 0,
      roll: 0,
      hasReference: false,
    };

    const filtered = {
      pitch: 0,
      roll: 0,
      x: 0,
      z: 0,
    };

    const state = {
      score: 0,
      bestScore: 0,
      elapsed: 0,
      sessionStarted: false,
      centeredX: 0,
      centeredZ: 0,
      time: 0,
      audioReady: false,
      panelVisible: true,
    };

    const soundModes = ['rainstick', 'maraca', 'sand', 'ocean', 'sine'];

    const soundLabels = {
      rainstick: 'Rainstick',
      maraca: 'Wooden Maraca',
      sand: 'Sand Falling',
      ocean: 'Ocean Rustle',
      sine: 'Sine Wave'
    };

    const ui = {
      stabilityValue: document.getElementById('stabilityValue'),
      bestValue: document.getElementById('bestValue'),
      timeValue: document.getElementById('timeValue'),
      soundLabel: document.getElementById('soundLabel'),
      calibrateBtn: document.getElementById('calibrateBtn'),
      resetBtn: document.getElementById('resetBtn'),
      soundMode: document.getElementById('soundMode'),
    };

    let audioContext = null;
    let noiseNode = null;
    let noiseGain = null;
    let filterNode = null;
    let modOsc = null;
    let modGain = null;
    let sineOsc = null;
    let sineGain = null;

    let currentSoundMode = ui.soundMode.value;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xffffff);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 50);
      camera.position.set(0, 1.6, 2);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);
      document.body.appendChild(VRButton.createButton(renderer));

      clock = new THREE.Clock();
      raycaster = new THREE.Raycaster();

      const hemi = new THREE.HemisphereLight(0xffffff, 0xdedede, 1.6);
      hemi.position.set(0, 1, 0);
      scene.add(hemi);

      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(1, 3, 2);
      scene.add(dir);

      room = new THREE.Group();
      scene.add(room);

      floor = new THREE.Mesh(
        new THREE.CircleGeometry(6, 64),
        new THREE.MeshStandardMaterial({ color: 0xf3f3f3, roughness: 1, metalness: 0 })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.position.y = 0;
      room.add(floor);

      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.35, 0.42, 64),
        new THREE.MeshBasicMaterial({
          color: 0x111111,
          transparent: true,
          opacity: 0.08,
          side: THREE.DoubleSide
        })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.002;
      room.add(ring);

      feedbackGroup = new THREE.Group();
      camera.add(feedbackGroup);
      feedbackGroup.position.set(0, 0, -1.0);
      scene.add(camera);

      createSpirographLine();
      createFrameGuide();
      createVRSoundPanel();

      ui.calibrateBtn.addEventListener('click', calibrateForward);
      ui.resetBtn.addEventListener('click', resetTrace);
      ui.soundMode.addEventListener('change', () => {
        setSoundMode(ui.soundMode.value);
      });

      renderer.xr.addEventListener('sessionstart', () => {
        state.sessionStarted = true;
        state.elapsed = 0;
        resetTrace();
        calibrateForward();
        setupAudio();
      });

      renderer.xr.addEventListener('sessionend', () => {
        state.sessionStarted = false;
        stopAudio();
      });

      const controller1 = renderer.xr.getController(0);
      const controller2 = renderer.xr.getController(1);
      controller1.addEventListener('selectstart', onVRSelect);
      controller2.addEventListener('selectstart', onVRSelect);
      scene.add(controller1);
      scene.add(controller2);

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('click', setupAudio, { once: true });

      updateUI();
    }

    function createSpirographLine() {
      tracePositions = new Float32Array(maxPoints * 3);
      traceGeometry = new THREE.BufferGeometry();
      traceGeometry.setAttribute('position', new THREE.BufferAttribute(tracePositions, 3));
      traceGeometry.setDrawRange(0, 0);

      const material = new THREE.LineBasicMaterial({
        color: 0x111111,
        transparent: true,
        opacity: 0.9,
      });

      traceLine = new THREE.Line(traceGeometry, material);
      feedbackGroup.add(traceLine);
    }

    function createFrameGuide() {
      const guide = new THREE.Mesh(
        new THREE.RingGeometry(0.28, 0.285, 96),
        new THREE.MeshBasicMaterial({
          color: 0x111111,
          transparent: true,
          opacity: 0.12,
          side: THREE.DoubleSide
        })
      );
      guide.position.set(0, 0, 0);
      feedbackGroup.add(guide);
    }

    function makeTextSprite(text, width = 512, height = 128, fontSize = 42) {
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      roundRect(ctx, 0, 0, width, height, 28);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0,0,0,0.14)';
      ctx.lineWidth = 4;
      roundRect(ctx, 2, 2, width - 4, height - 4, 26);
      ctx.stroke();

      ctx.fillStyle = '#111111';
      ctx.font = `${fontSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, width / 2, height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(0.36, 0.09, 1);
      sprite.userData.canvas = canvas;
      sprite.userData.ctx = ctx;
      sprite.userData.texture = texture;
      return sprite;
    }

    function updateTextSprite(sprite, text, fontSize = 42) {
      const canvas = sprite.userData.canvas;
      const ctx = sprite.userData.ctx;
      const texture = sprite.userData.texture;
      const width = canvas.width;
      const height = canvas.height;

      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      roundRect(ctx, 0, 0, width, height, 28);
      ctx.fill();

      ctx.strokeStyle = 'rgba(0,0,0,0.14)';
      ctx.lineWidth = 4;
      roundRect(ctx, 2, 2, width - 4, height - 4, 26);
      ctx.stroke();

      ctx.fillStyle = '#111111';
      ctx.font = `${fontSize}px Arial`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, width / 2, height / 2);

      texture.needsUpdate = true;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + width - radius, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
      ctx.lineTo(x + width, y + height - radius);
      ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      ctx.lineTo(x + radius, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
    }

    function createVRSoundPanel() {
      vrPanel = new THREE.Group();
      camera.add(vrPanel);
      vrPanel.position.set(0, -0.28, -0.9);

      const bg = new THREE.Mesh(
        new THREE.PlaneGeometry(0.72, 0.18),
        new THREE.MeshBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.92
        })
      );
      vrPanel.add(bg);

      vrPrevButton = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12, 0.1),
        new THREE.MeshBasicMaterial({ color: 0xeaeaea })
      );
      vrPrevButton.position.set(-0.23, 0, 0.001);
      vrPrevButton.userData.action = 'prevSound';
      vrPanel.add(vrPrevButton);

      vrNextButton = new THREE.Mesh(
        new THREE.PlaneGeometry(0.12, 0.1),
        new THREE.MeshBasicMaterial({ color: 0xeaeaea })
      );
      vrNextButton.position.set(0.23, 0, 0.001);
      vrNextButton.userData.action = 'nextSound';
      vrPanel.add(vrNextButton);

      const prevText = makeTextSprite('◀', 256, 128, 64);
      prevText.position.set(-0.23, 0, 0.01);
      prevText.scale.set(0.1, 0.05, 1);
      vrPanel.add(prevText);

      const nextText = makeTextSprite('▶', 256, 128, 64);
      nextText.position.set(0.23, 0, 0.01);
      nextText.scale.set(0.1, 0.05, 1);
      vrPanel.add(nextText);

      vrSoundText = makeTextSprite(soundLabels[currentSoundMode], 1024, 160, 44);
      vrSoundText.position.set(0, 0, 0.01);
      vrSoundText.scale.set(0.34, 0.06, 1);
      vrPanel.add(vrSoundText);
    }

    function onVRSelect(event) {
      const controller = event.target;

      tempMatrix.identity().extractRotation(controller.matrixWorld);
      raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
      raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);

      const intersects = raycaster.intersectObjects([vrPrevButton, vrNextButton], false);
      if (intersects.length === 0) return;

      const action = intersects[0].object.userData.action;
      if (action === 'prevSound') cycleSound(-1);
      if (action === 'nextSound') cycleSound(1);
    }

    function cycleSound(direction) {
      const currentIndex = soundModes.indexOf(currentSoundMode);
      let nextIndex = currentIndex + direction;
      if (nextIndex < 0) nextIndex = soundModes.length - 1;
      if (nextIndex >= soundModes.length) nextIndex = 0;
      setSoundMode(soundModes[nextIndex]);
    }

    function setSoundMode(mode) {
      currentSoundMode = mode;
      ui.soundMode.value = mode;
      ui.soundLabel.textContent = soundLabels[mode];
      if (vrSoundText) updateTextSprite(vrSoundText, soundLabels[mode], 44);
    }

    function resetTrace() {
      traceIndex = 0;
      traceGeometry.setDrawRange(0, 0);
      for (let i = 0; i < tracePositions.length; i++) tracePositions[i] = 0;
      traceGeometry.attributes.position.needsUpdate = true;
      state.time = 0;
      state.elapsed = 0;
      updateUI();
    }

    function calibrateForward() {
      const euler = getHeadEuler();
      calibration.yaw = euler.y;
      calibration.pitch = euler.x;
      calibration.roll = euler.z;
      calibration.hasReference = true;

      const headsetWorld = new THREE.Vector3();
      camera.getWorldPosition(headsetWorld);
      state.centeredX = headsetWorld.x;
      state.centeredZ = headsetWorld.z;
    }

    function getHeadEuler() {
      const q = new THREE.Quaternion();
      camera.getWorldQuaternion(q);
      const euler = new THREE.Euler().setFromQuaternion(q, 'YXZ');
      return euler;
    }

    function shortestAngleDiff(a, b) {
      let diff = a - b;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      return diff;
    }

    function lowPass(current, target, alpha = 0.35) {
      return current + alpha * (target - current);
    }

    function smoothstep(edge0, edge1, x) {
      const t = THREE.MathUtils.clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function updateGame(dt) {
      if (!calibration.hasReference) return;

      const euler = getHeadEuler();
      const headsetWorld = new THREE.Vector3();
      camera.getWorldPosition(headsetWorld);

      const yawError = shortestAngleDiff(euler.y, calibration.yaw);
      const pitchError = shortestAngleDiff(euler.x, calibration.pitch);
      const rollError = shortestAngleDiff(euler.z, calibration.roll);
      const dx = headsetWorld.x - state.centeredX;
      const dz = headsetWorld.z - state.centeredZ;

      filtered.pitch = lowPass(filtered.pitch, pitchError);
      filtered.roll = lowPass(filtered.roll, rollError);
      filtered.x = lowPass(filtered.x, dx);
      filtered.z = lowPass(filtered.z, dz);

      const rawSwayMagnitude = Math.sqrt(
        pitchError * pitchError * 0.9 +
        rollError * rollError * 0.9 +
        dx * dx * 1.8 +
        dz * dz * 1.8
      );

      const swayMagnitude = Math.sqrt(
        filtered.pitch * filtered.pitch * 0.9 +
        filtered.roll * filtered.roll * 0.9 +
        filtered.x * filtered.x * 1.8 +
        filtered.z * filtered.z * 1.8
      );

      const yawPenalty = Math.abs(yawError) * 0.7;
      const combinedError = swayMagnitude + yawPenalty;
      const rawCombinedError = rawSwayMagnitude + yawPenalty;

      const normalized = THREE.MathUtils.clamp(combinedError / 0.12, 0, 1);

      // quiet zone when almost still, then ramp up strongly
      const audioGate = smoothstep(0.02, 0.09, rawCombinedError);
      const audioNormalized = Math.pow(audioGate, 1.25);

      const score = Math.round((1 - normalized) * 100);
      state.score = score;
      state.bestScore = Math.max(state.bestScore, score);
      state.elapsed += dt;

      updateSpirograph(normalized);
      updateAudio(audioNormalized);
      updateUI();
    }

    function updateSpirograph(noiseAmount) {
      const visualGainRot = 0.7;
      const visualGainPos = 0.5;

      // flipped horizontal mapping so head right = trace right
      const x = (-filtered.roll * visualGainRot) + (filtered.x * visualGainPos);
      const y = filtered.pitch * visualGainRot + filtered.z * visualGainPos;
      const z = 0;

      addTracePoint(x, y, z);

      traceLine.material.opacity = 0.45 + (1 - noiseAmount) * 0.35;
    }

    function addTracePoint(x, y, z) {
      if (traceIndex >= maxPoints) {
        for (let i = 3; i < tracePositions.length; i++) {
          tracePositions[i - 3] = tracePositions[i];
        }
        traceIndex = maxPoints - 1;
      }

      const i = traceIndex * 3;
      tracePositions[i] = x;
      tracePositions[i + 1] = y;
      tracePositions[i + 2] = z;
      traceIndex++;

      traceGeometry.setDrawRange(0, traceIndex);
      traceGeometry.attributes.position.needsUpdate = true;
    }

    function setupAudio() {
      if (state.audioReady) return;

      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();

        const bufferSize = audioContext.sampleRate * 2;
        const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
        const data = buffer.getChannelData(0);

        for (let i = 0; i < bufferSize; i++) {
          data[i] = Math.random() * 2 - 1;
        }

        noiseNode = audioContext.createBufferSource();
        noiseNode.buffer = buffer;
        noiseNode.loop = true;

        filterNode = audioContext.createBiquadFilter();
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 1800;
        filterNode.Q.value = 1.2;

        noiseGain = audioContext.createGain();
        noiseGain.gain.value = 0.0;

        modOsc = audioContext.createOscillator();
        modOsc.type = 'sine';
        modOsc.frequency.value = 8;

        modGain = audioContext.createGain();
        modGain.gain.value = 0.0;

        sineOsc = audioContext.createOscillator();
        sineOsc.type = 'sine';
        sineOsc.frequency.value = 220;

        sineGain = audioContext.createGain();
        sineGain.gain.value = 0.0;

        modOsc.connect(modGain);
        modGain.connect(noiseGain.gain);

        noiseNode.connect(filterNode);
        filterNode.connect(noiseGain);
        noiseGain.connect(audioContext.destination);

        sineOsc.connect(sineGain);
        sineGain.connect(audioContext.destination);

        noiseNode.start();
        modOsc.start();
        sineOsc.start();

        state.audioReady = true;
      } catch (err) {
        console.warn('Audio could not start:', err);
      }
    }

    function updateAudio(amount) {
      if (!state.audioReady || !audioContext) return;
      if (audioContext.state === 'suspended') audioContext.resume();

      const movement = THREE.MathUtils.clamp(amount, 0, 1);

      // silent when almost still
      if (movement < 0.03) {
        noiseGain.gain.value = 0;
        sineGain.gain.value = 0;
        modGain.gain.value = 0;
        return;
      }

      // stronger rise after the quiet zone
      const density = Math.pow(movement, 1.5);

      noiseGain.gain.value = 0.0;
      sineGain.gain.value = 0.0;
      modGain.gain.value = 0.0;

      if (currentSoundMode === 'sine') {
        sineOsc.frequency.value = 180 + density * 500;
        sineGain.gain.value = density * 0.06;
        return;
      }

      if (currentSoundMode === 'rainstick') {
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 900 + density * 2800;
        filterNode.Q.value = 0.7 + density * 3.5;
        noiseGain.gain.value = density * 0.05;
        modOsc.frequency.value = 4 + density * 26;
        modGain.gain.value = density * 0.016;
        return;
      }

      if (currentSoundMode === 'maraca') {
        filterNode.type = 'highpass';
        filterNode.frequency.value = 1600 + density * 3000;
        filterNode.Q.value = 0.6 + density * 1.6;
        noiseGain.gain.value = density * 0.04;
        modOsc.frequency.value = 8 + density * 32;
        modGain.gain.value = density * 0.022;
        return;
      }

      if (currentSoundMode === 'sand') {
        filterNode.type = 'lowpass';
        filterNode.frequency.value = 550 + density * 1100;
        filterNode.Q.value = 0.3 + density * 0.9;
        noiseGain.gain.value = density * 0.06;
        modOsc.frequency.value = 2 + density * 10;
        modGain.gain.value = density * 0.007;
        return;
      }

      if (currentSoundMode === 'ocean') {
        filterNode.type = 'bandpass';
        filterNode.frequency.value = 280 + density * 900;
        filterNode.Q.value = 0.25 + density * 0.9;
        noiseGain.gain.value = density * 0.075;
        modOsc.frequency.value = 0.5 + density * 3.5;
        modGain.gain.value = density * 0.024;
      }
    }

    function stopAudio() {
      try { if (noiseNode) noiseNode.stop(); } catch (e) {}
      try { if (modOsc) modOsc.stop(); } catch (e) {}
      try { if (sineOsc) sineOsc.stop(); } catch (e) {}

      if (audioContext) {
        audioContext.close();
        audioContext = null;
      }

      noiseNode = null;
      noiseGain = null;
      filterNode = null;
      modOsc = null;
      modGain = null;
      sineOsc = null;
      sineGain = null;
      state.audioReady = false;
    }

    function updateUI() {
      ui.stabilityValue.textContent = String(state.score);
      ui.bestValue.textContent = String(state.bestScore);
      ui.timeValue.textContent = state.elapsed.toFixed(1);
      ui.soundLabel.textContent = soundLabels[currentSoundMode];
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      renderer.setAnimationLoop(render);
    }

    function render() {
      const dt = Math.min(clock.getDelta(), 0.05);
      updateGame(dt);
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
